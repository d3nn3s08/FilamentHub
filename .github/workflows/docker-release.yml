name: Docker Build & Publish

on:
  release:
    types: [published]
  push:
    branches:
      - beta

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Read version from config.yaml (used for beta image tags)
      # ------------------------------------------------------------------
      - name: Read version from config.yaml
        id: version
        run: |
          ver=$(python3 - << 'EOF'
          import yaml
          with open("config.yaml") as f:
              print(yaml.safe_load(f)["app"]["version"])
          EOF
          )
          echo "version=$ver" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 3. Build Docker metadata / tags
      # ------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/filamenthub
          tags: |
            # On release published: tag with semver (e.g. v0.1.2 and 0.1.2)
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            # "latest" only for stable (non-prerelease) releases
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}
            # Beta branch: "beta" tag + versioned beta tag
            type=raw,value=beta,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ steps.version.outputs.version }}-beta,enable=${{ github.event_name == 'push' }}

      # ------------------------------------------------------------------
      # 4. Docker setup
      # ------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 5. Login to GitHub Container Registry
      # ------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 6. Build & Push
      # ------------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
